<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ex03</title>

<script>
    var txta = prompt("Enter any integer:");

    if (txta === null || txta.trim() === "" || isNaN(txta)) {
        document.write("<p style='color:red;'>You must enter a number</p>");
    } else {
        var a = Number(txta);

        if (a % 2 === 0) {
            document.write("<p style='color:green;'><b>" + a + " is an even number</b></p>");
        } else {
            document.write("<p style='color:blue;'><i>" + a + " is an odd number</i></p>");
        }
    }
</script>

</head>
<body>
</body>
</html>
