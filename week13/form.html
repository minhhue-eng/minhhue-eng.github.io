<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.container {
    width: 700px;
    margin: 40px auto;
    background: #fff;
    padding: 20px 40px;
    border: 1px solid #ccc;
}

h2 {
    color: #c40000;
    text-align: left;
    margin-bottom: 20px;
}

hr {
    border: 0;
    border-top: 1px solid #ccc;
    margin: 20px 0;
}

.row {
    display: flex;
    align-items: center;
    margin: 10px 0;
}

.row label {
    width: 150px;
    color: #2c5aa0;
}

.row input, .row select {
    padding: 6px;
    width: 220px;
}

.inline {
    display: flex;
    gap: 10px;
}

.name-row input {
    width: 180px;
}

.interests {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    padding-left: 150px;
}

.interests label {
    color: #2c5aa0;
}

button {
    display: block;
    margin: 30px auto;
    padding: 12px 30px;
    font-size: 16px;
    color: white;
    background: linear-gradient(#ff3c00, #b30000);
    border: none;
    border-radius: 25px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
    <h2>REGISTRATION</h2>
    <hr>

    <div class="row">
        <label>Username:</label>
        <input type="text">
    </div>

    <div class="row">
        <label>Password:</label>
        <input type="password">
    </div>

    <div class="row">
        <label>Re-type Password:</label>
        <input type="password">
    </div>

    <hr>

    <div class="row">
        <label>Birthday:</label>
        <div class="inline">
            <select>
                <option>[select one]</option>
                <option>January</option>
                <option>February</option>
                <option>March</option>
            </select>
            <input type="text" placeholder="Day" style="width:80px;">
            <input type="text" placeholder="Year" style="width:100px;">
        </div>
    </div>

    <div class="row">
        <label>Images:</label>
        <input type="file">
    </div>

    <hr>

    <div class="row name-row">
        <label>First Name:</label>
        <input type="text">
        <label style="width:120px; text-align:right;">Last Name:</label>
        <input type="text">
    </div>

    <hr>

    <div class="row">
        <label>Interests (optional):</label>
    </div>

    <div class="interests">
        <label><input type="checkbox"> Entertainment</label>
        <label><input type="checkbox"> Business</label>
        <label><input type="checkbox"> Home & Family</label>
        <label><input type="checkbox"> Computers & Technology</label>
        <label><input type="checkbox"> Health</label>
        <label><input type="checkbox"> Personal Finance</label>
        <label><input type="checkbox"> Music</label>
        <label><input type="checkbox"> Small Business</label>
    </div>

    <button>REGISTER</button>

</div>

</body>
</html>
